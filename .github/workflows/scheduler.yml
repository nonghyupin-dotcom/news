name: Auto News Scraper

on:
  schedule:
    # 깃허브 서버는 영국 시간(UTC) 기준입니다. 
    # 한국 아침 8시는 영국 밤 11시(23시)이므로 아래처럼 설정합니다.
    - cron: '0 23 * * *'
  workflow_dispatch: # 이 줄은 우리가 언제든 수동으로 로봇을 깨워볼 수 있게 해주는 버튼입니다.

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 내 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 환경 세팅하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 필요한 도구(라이브러리) 설치하기
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. 뉴스 수집 봇 실행하기!
      env:
        # 아까 1단계에서 금고에 넣은 열쇠들을 로봇에게 쥐어줍니다.
        GCP_KEY_JSON: ${{ secrets.GCP_KEY_JSON }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python batch_scraper.py
